                - text:
                    en: "Another coffee making algorithm is called 'Sequential espresso–water coupling method'."
                - text:
                    en: "Another coffee making algorithm is called 'First-order dilution-stabilized black coffee formulation'."
                - text:
                    en: "Another coffee making algorithm is called 'Two-component espresso–milk coupling with microfoam stabilization'."
                - text:
                    en: "Another coffee making algorithm is called '3-stage thermal homogenization and lipid-emulsion integration method'."
                - text:
                    en: "Another coffee making algorithm is called 'Implicit crema–foam interface smoothing algorithm'."
                - text:
                    en: "Another coffee making algorithm is called 'High-volume dairy-dominant espresso blending scheme'."
                - text:
