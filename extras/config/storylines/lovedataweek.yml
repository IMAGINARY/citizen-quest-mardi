                type: sequence
                items:
                - text:
                    en: "I have collected quite some data on the behavior of cat fur. One thing I investigated was the cause–effect relationship of Diet and Fur Quality."
                - text:
                    en: "I am happy to share this dataset with the GMCI community. I have just one question:"
              - cond: '^op.data.dog & op.notsuredata.dog'
                type: sequence
                items:
                - text:
                    en: "Did you talk to the MaRDI help desk? I hope you found an answer to my question:"
              - cond: '^op.data.dog'
                type: sequence
                items:
                - text:
                    en: "Which format should I use?"
                  responses:
                    - text:
                        en: "I am not sure."
                      thenText:
                        en: "Please ask the MaRDI help desk, which format I should use. I will wait for you here."
                      set: [ 'op.notsuredata.dog' ]
                    - text:
                        en: "There is no specific format required."
                      thenText:
                        en: "Are you sure? Maybe you should ask at the MaRDI help desk, which format is best."
                      set: [ 'op.notsuredata.dog' ]
                    - text:
                        en: "tabular format: .csv, .txt, .tsv."
                      thenText:
                        en: "Thanks. I will share the dataset in tabular format with the GMCI community."
                      set: [ 'op.data.dog' ]
                    - text:
                        en: "Each data point should be connected to a unique identifier by an arrow."
                      thenText:
                        en: "Are you sure? That sounds like Gibberish to me. Maybe you should ask at the MaRDI help desk, which format is best."
                      set: [ 'op.notsuredata.dog' ]
          Barista:  
            - type: sequence
              items:
              - cond: 'op.nodata.barista'
                type: sequence
                items:
                - text:
                    en: "You already talked to me. We agreed my data is not suitable for the GMCI community."
                - text:
                    en: "I have now uploaded it to Zenodo, the free, open-access repository, so it is publicly available and can be linked, for example with the corresponding algorithms nodes in the MathAlgoDB knowledge graph."
              - cond: '^op.nodata.barista & ^op.notsuredata.barista'
                type: sequence
                items:
                - text:
                    en: "I have collected quite some data benchmarking coffee brewing algorithms for performance (e.g., optimization accuracy or speed). All the data is in a big excel sheet."
              - cond: '^op.nodata.barista & op.notsuredata.barista'
                type: sequence
                items:
                - text:
                    en: "Did you talk to the MaRDI help desk? I hope you found an answer to my question:"
              - cond: '^op.nodata.barista'
                type: sequence
                items:            
                - text:
                    en: "Is my data appropriate to share with the GMCI community?"
                  responses:
                    - text:
                        en: "I am not sure."
                      thenText:
                        en: "Please ask the MaRDI help desk, if this kind of data is appropriate for the GMCI community. I will wait for you here."
                      set: [ 'op.notsuredata.barista' ]
                    - text:
                        en: "Your data is not suitable."
                      thenText:
                        en: "You are right. The data is more algorithm evaluation than causal inference, and therefore not suitable for the GMCI community."
                      then: nodata
                    - text:
                        en: "Your data is perfect for the GMCI community."
                      thenText:
                        en: "Well, actually, I don't think so. It is more algorithm evaluation than causal inference, so not suitable for the GMCI community."
                      then: nodata
                    - text:
                        en: "Yes, an excel sheet is fine."
                      thenText:
                        en: "I was more worried about the data itself. Please ask the MaRDI help desk, if this kind of data is appropriate for the GMCI community."
                      set: [ 'op.notsuredata.barista' ]
            - cond: '^op.nodata.barista'
              id: nodata
              type: sequence
              items:
                - text:
                    en: "However, I talked to some researchers during the coffe break already. They told me about some interesting datasets they have. You can ask them to share their datasets with the GMCI community."
                  set: [ 'op.nodata.barista' ]
          MathPerson2:
            - type: sequence
              items:
              - cond: 'op.data.math2'
                type: sequence
                items:
                - text:
                    en: "You already convinced me to share my dataset with the GMCI community."
              - cond: '^op.data.math2 & ^op.notsuredata.math2'
                type: sequence
                items:
                - text:
                    en: "I have a simulation dataset that includes variables such as fluid viscosity, thermal conductivity, density, Prandtl number, and measured heat transfer coefficient."
                - text:
                    en: "With such data, you can analyze whether changes in viscosity causally influence heat transfer performance. I'm happy to share the dataset, just one question:"
              - cond: '^op.data.math2 & op.notsuredata.math2'
                type: sequence
                items:      
                - text:
                    en: "Did you talk to the MaRDI help desk? I hope you found an answer to my question:"
              - cond: '^op.data.math2'
                type: sequence
                items:      
                - text:
                    en: "Can you tell me, if data files shared with the GMCI community can be versioned?"
                  responses:
                    - text:
                        en: "I am not sure."
                      thenText:
                        en: "Please ask the MaRDI help desk, if data files can be versioned in the GMCI community. I will wait for you here."
                      set: [ 'op.notsuredata.math2' ]
                    - text:
                        en: "No, data files cannot be versioned."
                      thenText:
                        en: "This doesn't sound right. MaRDI is using a modern approach, I am pretty sure that data files can be versioned in the GMCI community. Please ask the MaRDI help desk, I will wait for you here."
                      set: [ 'op.notsuredata.math2' ]
                    - text:
                        en: "Yes, data files can be versioned."
                      thenText:
                        en: "Great! I will share my dataset with the GMCI community. Versioning is important for datasets, because it allows to track changes, revert to previous versions if needed, and maintain a history of the dataset's evolution."
                      set: [ 'op.data.math2' ]
          webBrowser:
            - text:
                en: "Where do you want to go?"
              responses:
                - text:
                    en: "MathModDB"
                  thenText: "MathModDB is a database of mathematical models. It helps organize and link mathematical models, offering structured insights into mathematical modelling and related computational tasks. "
                - text:
                    en: "MathAlgoDB"
                  thenText: "MathAlgoDB Knowledge Graph for Scientific Computing connects mathematical algorithms, models, problems, and software in a structured knowledge graph."
                - text:
                    en: "MaRDMO"
                  thenText: "MaRDMO is a user-friendly interface which can be used to add mathematical models to MathModDB."
                - text:
                    en: "GMCI"
                  thenText: "GMCI stands for the community Graphical Modelling and Causal Inference. On this platform, we curate and present topical datasets, dataset collections, and metadata."
                  then: gmci
            - id: gmci
              type: sequence
              items:
                - text:
                    en: "Each dataset entry is presented within a fixed structure with a description, intended task, and a detailed summary. References to the source are given, and new submissions should follow the layout."
                - text:
                    en: "The associated digital object identifier (DOI) allows for permanent references to the object. Submit, store, and publish your topical dataset or collection for public accessibility, visibility, and longevity."
          Help:
            - type: sequence
              items:
                - text:
                    en: "Welcome back! Do you need answers to some questions about sharing datasets with the GMCI community?"
                  responses:
                    - text:
                        en: "In which format should a dataset be submitted?"
                      thenText: 
                        en: "All datasets should be in tabular format: .csv, .txt, .tsv. Additionally, if a ground truth exists for the dataset, it should be provided in a separate file."
                    - text:
                        en: "What is 'Graphical Modelling and Causal Inference'?"
                      then: gmci
                    - text:
                        en: "I have a different question."
                      then: more 
                    - text:
                        en: "No, I am all set, thank you!"
                      thenText: 
                        en: "Great! Come back anytime if you have more questions."
            - id: more
              type: sequence
              items:
                - text:
                    en: "Please ask your question, and I will do my best to answer it or find the right person to answer it for you."
                  responses:
                    - text:
                        en: "How is ownership handled in the GMCI community?"
                      thenText: "When uploading to the community, no ownership rights are transferred, nor is a licence transferred. The dataset will be attributed to you as the contributor, and you will retain ownership of your data."
                    - text:
                          en: "Can the data files be versioned?"
                      thenText: "Yes, data files can be versioned. You can maintain a history of changes and ensure that users can access the most up-to-date version of your dataset while still preserving the original version for reference."
                    - text:
                        en: "I don't have any more questions, thank you!"
                      thenText: 
                        en: "Great! Come back anytime if you have more questions."
            - id: gmci
              type: sequence
              items:
                - text:
                    en: "Graphical Modelling and Causal Inference is a framework for representing and analyzing relationships between variables using graphs (such as directed acyclic graphs)."
                - text:
                    en: "It allows researchers to distinguish correlation from causation and to answer questions like “What happens if we change X?” by modeling explicit cause–effect structures."
                - text:
                    en: "Suppose we draw a simple graph: Rain → Wet Ground. Graphical modelling represents this relationship with an arrow, and causal inference lets us ask: 'If we could make it rain, would the ground become wet?'"
                - text:
                    en: "It is not simply plotting data and observing that two variables move together without modeling whether one actually causes the other. Such data would not be suitable for the GMCI community."
          MathPerson1:
            - type: sequence
              items:
              - cond: 'op.data.math3'
                type: sequence
                items:
                - text:
                    en: "You already convinced me to share my dataset with the GMCI community."
              - cond: '^op.data.math3 & ^op.notsuredata.math3'
                type: sequence
                items:
                - text:
                    en: "I’ve compiled a dataset of object interactions whose hidden structure follows the identities of Moufang loops. I could contribute it, just one question:"
              - cond: '^op.data.math3 & op.notsuredata.math3'
                type: sequence
                items:      
                - text:
                    en: "Did you talk to the MaRDI help desk? I hope you found an answer to my question:"
              - cond: '^op.data.math3'
                type: sequence
                items:
                - text:
                    en: "How is ownership handled at the GMCI community?"
                  responses:
                    - text:
                        en: "I am not sure."
                      thenText:
                        en: "Please ask the MaRDI help desk, how ownership is handled in the GMCI community. I will wait for you here."
                      set: [ 'op.notsuredata.math3' ]
                    - text:
                        en: "You will keep the ownership."
                      thenText:
                        en: "Great! I will share my dataset with the GMCI community. I think ownership is important for datasets, because it defines who can legally use, share, and control the data while ensuring accountability and proper credit."
                      set: [ 'op.data.math3' ]
                    - text:
                        en: "Authorship and license are transfered to the community."
                      thenText:
                        en: "This does not sound right. Please ask at the MaRDI help desk how ownership is handled in the GMCI community. I will wait for you here."
                      set: [ 'op.notsuredata.math3' ]
ending:
  dialogue:
