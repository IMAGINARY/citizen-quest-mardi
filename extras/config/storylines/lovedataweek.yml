decision:
  en: "Talk to the characters and solve their quests."
prompt:
  en: "You are at a conference about applied mathematics. You enter the scene after a conference slot, the audience leaves the room and discusses the presentations they have just heard. Some may have problems you can help them with."
scenery:
  mardiDesk:
    spawn: { x: 444, y: 553 }
  coffeeTable:
    spawn: { x: 1327, y: 551 }
  libraryDesk:
    spawn: { x: 1902, y: 547 } 
npcs:
  Exit:
    name:
      en: "Exit"
    type: invisible
    spawn: { x: 10, y: 366 }
    dialogue:
    - type: sequence
      items:
        - text:
            en: "If you are using a keyboard, press 'E' to leave the conference. You will arrive at the end screen of the game."
        - text:
            en: "If you are using a gamepad, you will need to wait until the timer ends. Go get yourself a coffee at the coffee machine or chat with the robot."
  MathPerson1:
    name:
      en: "Aurela I. Moufang"
    type: citizenBlue
    spawn: { x: 819, y: 448 }
    dialogue:
    - type: sequence
      items:
        - text:
            en: "I am an industrial mathematician and I also do research in projective geometry. You might have heard about Moufang loops, a special kind of algebraic structure, or the branch of geometry called Moufang planes."
  robot:
    name:
      en: "Robot"
    spawn: { x: 1079, y: 500 }
    dialogue:
      - type: random
        items:
          - text:
              en: "Have you subscribed to the MaRDI newsletter, yet?"
          - text:
              en: "Information is data tagged with meaning."
          - text:
              en: "Pure mathematics dreams in infinity. Applied mathematics wakes up and files a bug report."
          - text:
              en: "In theory, the model is elegant. In practice, it meets data."
          - text:
              en: "Applied mathematics: where epsilon is small, but consequences are not."
          - text:
              en: "All models are wrong, but some get funded."
          - text:
              en: "Good applied mathematicians don’t just solve equations. They negotiate with reality."
          - text:
              en: "If it works on the first try, you probably hard-coded the answer."
          - text:
              en: "Applied math is the art of approximating the universe without upsetting it."
          - text:
              en: "We don’t predict the future. We bound it."
          - text:
              en: "Data that can’t be found might as well be fiction."
          - text:
              en: "Accessible beats impressive."
          - text:
              en: "Interoperable data is the lingua franca of algorithms."
          - text:
              en: "Reusable data is the gift that keeps on computing."
          - text:
              en: "Garbage in, garbage out, but undocumented in, non-reproducible forever."
          - text:
              en: "I told my model it was overfitting. It said, 'No, I’m just deeply committed.'"
          - text:
              en: "Applied math is like cooking. Pure math proves the recipe exists. Applied math tries to make it edible."
          - text:
              en: "Applied mathematicians don’t fear chaos. They discretize it."
          - text:
              en: "'It’s well-documented,' they said. The documentation: Final_version_REAL_v3_last.xlsx."
          - text:
              en: "Optimization is easy. Documentation is hard."
          - text:
              en: "In God we trust. All others must provide version control."
          - text:
              en: "Applied math is the study of ε so small it matters."
          - text:
              en: "No persistent identifier, no fixed point."
          - text:
              en: "Open data is a boundary condition for collaboration."
          - text:
              en: "In applied math, we linearize first and apologize later."
          - text:
              en: "Singular limits separate the brave from the tenured."
          - text:
              en: "A good scaling argument is worth a thousand simulations."
          - text:
              en: "Applied mathematics is where analysis negotiates with RAM."
  Help:
    name:
      en: "MaRDI Helpdesk"
    spawn: { x: 450, y: 538 }
    type: citizenPunk
    actAs: 
      - '_mardiHelpdesk'
    dialogue:
      - text:
          en: "I work at the MaRDI help desk. I will help you with questions about data."
  MathPerson2:
    name:
      en: "Lou Prandtl"
    spawn: { x: 1212, y: 333 }
    type: citizenLila
    dialogue:
      - text:
          en: "I am a specialist in fluid dynamics. I am here to learn about the latest developments in research data management."
  Librarian:
    name:
      en: "Librarian"
    spawn: { x: 1929, y: 530 }
    type: citizenHoodie
    dialogue:
      - text:
          en: "A good index saves more time than a fast algorithm."
  Barista:
    name:
      en: "Barista"
    spawn: { x: 1400, y: 500 }
    type: barista
    dialogue:
      - type: sequence
        items:
          - text:
              en: "I brought some cookies. But you wanna know a secret?"
          - text:
              en: "The cake is a lie."
  Dog:
    name:
      en: "Momo"
    spawn: { x: 560, y: 380 }
    type: dogTan
    dialogue:
      - text:
          en: "Woof!"
  MathPerson3:
    name:
      en: "Richie Mises"
    type: journalist
    spawn: { x: 280, y: 333 }
    dialogue:
      - text:
          en: "I am a researcher in applied mathematics and mechanics. I am interested in learning about research data management and how it can be applied to my work."
  coffeeMachine:
    type: invisible
    name:
      en: "PercoLaTeX 3000™"
    spawn: { x: 1229, y: 560 }
    dialogue:
      - type: first
        items:
          - text:
              en: "Guess which description matches which type of coffee! We offer Latte Macchiato, Espresso, Americano and Caffè Latte. Choose wisely!"
            responses:
              - text:
                  en: "Closed Form Expression"
                thenText:
                  en: "A closed-form solution is compact, contains no iterative steps, and produces a result immediately. Just like an Espresso!"
                then: brew
              - text:
                  en: "Affine Transformation"
                thenText:
                  en: "Take an Espresso and add some hot water. This is an affine transformation, since you just change the scale of the Espresso, but not its structure. This is an Americano!"
                then: brew
              - text:
                  en: "Function Composition"
                thenText:
                  en: "Let E(x) = add Espresso, M(y) = add hot milk, and F(z) = add milk foam. Then the composed function C: X -> Z, C(x)=F(M(E(x))) describes a Latte Macchiato. And don't even think about changing the order of the process!"
                then: brew
              - text:
                  en: "Weighted Linear Combination"
                thenText:
                  en: "Take the weighted linear combination: α (espresso) + β (milk).  For β ≫ α,  this is a Caffè Latte!"
                then: brew
      - id: brew
        type: sequence
        items:
          - text:
              en: "Beep! Whirrrrrr...Ssshhhhhhhh... drip, drip, drip."
          - text:
              en: "Here you go. Be careful, it is hot! ☕"
            set: [ 'pnt.coffee.coffee' , 'op.quest.coffeemachine' ]
  webBrowser:
    type: invisible
    name:
      en: "MaRDI Portal"
    spawn: { x: 1547, y: 322 }
    dialogue:
      - text:
          en: "Where do you want to go?"
        responses:
          - text:
              en: "MathModDB"
            thenText: "MathModDB is a database of mathematical models. It helps organize and link mathematical models, offering structured insights into mathematical modelling and related computational tasks. "
          - text:
              en: "MathAlgoDB"
            thenText: "MathAlgoDB Knowledge Graph for Scientific Computing connects mathematical algorithms, models, problems, and software in a structured knowledge graph."
          - text:
              en: "MaRDMO"
            thenText: "MaRDMO builds on the Research Data Management Organiser (RDMO) to help document, integrate, and share mathematical models, workflows, and algorithms."
          - text:
              en: "GMCI"
            thenText: "GMCI stands for the community Graphical Modelling and Causal Inference. On this platform, we curate and present topical datasets, dataset collections, and metadata."
quests:  
  coffee:
    npc: Barista
    mood: exclamation
    available:
      dialogue:
        - type: sequence
          items:
            - text:
                en: "I have been wondering how to improve the coffee experience for the conference participants. I want to reduce the preparation time, and if possible further improve the taste."
            - text:
                en: "I want to update my machine, but would need to know what algorithms are available. Can you help me with that?"
              responses:
                - text:
                    en: "Sure, I'll help you."
                  thenText:
                    en: "Great, thank you! Please ask some of the data experts around, where I can find information about different coffee making algorithms."
                  set: [ 'quest.coffee.active' ]
                - text:
                    en: "No, sorry, I just want a cookie."
                  thenText:
                    en: "Oh, that's too bad. But sure, take a cookie. Maybe next time!"
    stages:
      - cond: 'found.mathalgodb.1'
        prompt:
          en: "Tell the Barista about your findings."
        dialogues:
          Help:
            - text:
                en: "I work at the MaRDI help desk. I will help you with questions about data."
          dog:
            - text:
                en: "Woof! Woof!"
