          class: 'citizensEmpowered'
          type: sequence
          items:
            - text:
                en: "☑ You helped Momo to add the Hairy Cat Model to MathModDB."
        - cond: 'quest.coffee.done'
          class: 'citizensEmpowered'
          type: sequence
          items:
            - text:
                en: "☑ You searched MathAlgoDB for coffee making algorithms."
        - cond: 'quest.gmci.done'
          class: 'citizensEmpowered'
          type: sequence
          items:
            - text:
                en: "☑ You helped to add more datasets to the GMCI community."
        - cond: '^quest.hairycat.done'
          type: sequence
          items:
            - text:
                en: "You did not find out where to best share a mathematical model."
        - cond: '^quest.mathmoddb.done'
          type: sequence
          items:
            - text:
                en: "You did not help Momo to publish the Hairy Cat Model."
        - cond: '^quest.coffee.done'
          type: sequence
          items:
            - text:
                en: "You did not help the Barista to search for coffee making algorithms."
        - cond: '^quest.gmci.done'
          type: sequence
          items:
            - text:
                en: "You did not help to add more datasets to the community."
        - cond: '^op.quest.coffeemachine'
          type: sequence
          items:
            - text:
                en: "Next time, get a coffee from the coffee machine ☕"      
        - cond: 'COUNT("op.quest") < 5'
          type: sequence
          items:
            - text:
                en: "Try again!"
        - cond: 'COUNT("op.quest") = 5'
